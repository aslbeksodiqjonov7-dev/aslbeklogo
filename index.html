<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AslbekLogo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    text-align:center;
    margin:0;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

input,select{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

#logoPreview{
    margin-top:30px;
    padding:40px;
    border:2px dashed #ccc;
    border-radius:12px;
    font-size:40px;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <h1>AslbekLogo</h1>
    <p>Create Professional Logos Instantly</p>
</header>

<div class="container">

<h2>Create Your Logo</h2>

<input type="text" id="logoName" placeholder="Enter Logo Name">

<br>

<input type="color" id="logoColor" value="#2563eb">

<br>

<select id="logoStyle">
    <option>Modern</option>
    <option>Minimal</option>
    <option>Gaming</option>
    <option>Business</option>
</select>

<br>

<button onclick="generateLogo()">Generate Logo</button>

<div id="logoPreview">
    Your Logo
</div>

</div>
    
<img id="aiLogo" style="max-width:100%;margin-top:20px;display:none;">
<script>
function generateLogo(){
    let name = document.getElementById("logoName").value;
    let color = document.getElementById("logoColor").value;

    if(name==""){
        name="AslbekLogo";
    }

    let preview = document.getElementById("logoPreview");

    preview.innerHTML=name;
    preview.style.color=color;
}
</script>
<script>
function generateLogo(){
    let name = document.getElementById("logoName").value;
    let color = document.getElementById("logoColor").value;

    if(name==""){
        name="AslbekLogo";
    }

    let preview = document.getElementById("logoPreview");

    preview.innerHTML=name;
    preview.style.color=color;
}

function downloadLogo(){
    html2canvas(document.getElementById("logoPreview")).then(canvas => {
        const link = document.createElement("a");
        link.download = "logo.png";
        link.href = canvas.toDataURL();
        link.click();
        let prompt = "professional logo for " + name;

let img = document.getElementById("aiLogo");
img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
img.style.display = "block";
    });
}
</script>

<button onclick="downloadLogo()">Download PNG</button>
    
</body>
</html>
