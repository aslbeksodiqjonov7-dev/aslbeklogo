<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AslbekLogo AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#050816,#111827,#1e1b4b);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:390px;
padding:35px;
background:rgba(17,24,39,.92);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,.08);
}

.logoTitle{
font-size:32px;
font-weight:700;
margin-bottom:8px;
}

.logoTitle span{
color:#6d5cff;
}

.logoSub{
color:#94a3b8;
margin-bottom:30px;
line-height:1.6;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:600;
}

input,
select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,
select:focus{
box-shadow:0 0 0 2px #6d5cff;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:18px;
transition:.3s;
}

.generateBtn{
background:#6d5cff;
color:white;
}

.generateBtn:hover{
transform:translateY(-2px);
background:#7f70ff;
}

.downloadBtn{
background:#1f2937;
color:white;
}

.downloadBtn:hover{
background:#374151;
}

  .main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.previewBox{
width:820px;
min-height:620px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
}

#aiLogo{
display:none;
max-width:420px;
max-height:420px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

#logoText{
font-size:46px;
font-weight:700;
text-align:center;
}

.cards{
margin-top:35px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
width:100%;
}

.card{
height:140px;
border-radius:18px;
background:#1f2937;
border:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#6d5cff;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
background:#283548;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h1 class="logoTitle">
Aslbek<span>Logo</span> AI
</h1>

<p class="logoSub">
Create premium AI logos in seconds.
</p>

<label>Logo Name</label>
<input id="logoName" placeholder="Nike">

<label>Logo Topic</label>
<input id="logoTopic" placeholder="Football, Shop, Restaurant">

<label>Industry</label>

<select id="logoIndustry">
<option>Sports</option>
<option>Business</option>
<option>Technology</option>
<option>Restaurant</option>
<option>Fashion</option>
<option>Education</option>
</select>

  <label>Logo Style</label>

<select id="logoStyle">
<option>Modern</option>
<option>Minimal</option>
<option>Gaming</option>
<option>Luxury</option>
<option>Mascot</option>
<option>3D</option>
</select>

<label>Main Icon</label>
<input id="logoIcon" placeholder="Football, Lion, Crown, Car...">

<label>Primary Color</label>
<input type="color" id="logoColor" value="#6d5cff">

<button class="generateBtn" onclick="generateLogo()">
<i class="fa-solid fa-wand-magic-sparkles"></i>
Generate AI Logo
</button>

<button class="downloadBtn" onclick="downloadLogo()">
<i class="fa-solid fa-download"></i>
Download PNG
</button>

</div>

<div class="main">

<div class="previewBox">

<img id="aiLogo">

<h2 id="logoText">
Your Logo
</h2>

<div class="cards">

<div class="card">
<i class="fa-solid fa-futbol"></i>
</div>

<div class="card">
<i class="fa-solid fa-crown"></i>
</div>

<div class="card">
<i class="fa-solid fa-bolt"></i>
</div>

<div class="card">
<i class="fa-solid fa-store"></i>
</div>

</div>

</div>

</div>

</div>

  <script>

function generateLogo(){

let name=document.getElementById("logoName").value.trim();
let topic=document.getElementById("logoTopic").value.trim();
let industry=document.getElementById("logoIndustry").value;
let style=document.getElementById("logoStyle").value;
let icon=document.getElementById("logoIcon").value.trim();
let color=document.getElementById("logoColor").value;

if(name==="") name="AslbekLogo";
if(topic==="") topic="Business";
if(icon==="") icon=topic;

const text=document.getElementById("logoText");

text.innerHTML="Generating...";

text.style.color=color;

const prompt=`
Professional ${style} vector logo.
Brand ${name}.
Topic ${topic}.
Industry ${industry}.
Main icon ${icon}.
Minimal.
Premium.
Transparent background.
Centered.
`;

const img=document.getElementById("aiLogo");

img.onload=function(){

text.innerHTML=name;

img.style.display="block";

};

img.src="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);

}

function downloadLogo(){

html2canvas(document.querySelector(".previewBox"),{
backgroundColor:null,
scale:2
}).then(canvas=>{

const a=document.createElement("a");

a.download="AslbekLogo.png";

a.href=canvas.toDataURL("image/png");

a.click();

});

}

const cards = document.querySelectorAll(".card");

cards.forEach((card,index)=>{

card.onclick=function(){

let icons=[
"football",
"lion",
"crown",
"store"
];

let icon=icons[index];

let name=document.getElementById("logoName").value||"AslbekLogo";
let topic=document.getElementById("logoTopic").value||"Business";
let style=document.getElementById("logoStyle").value;
let industry=document.getElementById("logoIndustry").value;
let color=document.getElementById("logoColor").value;

document.getElementById("logoText").style.color=color;

let prompt=`
Professional ${style} vector logo.
Brand ${name}.
Industry ${industry}.
Topic ${topic}.
Main icon ${icon}.
Premium.
Flat vector.
Transparent background.
`;

let img=document.getElementById("aiLogo");

img.style.opacity="0.3";

img.onload=function(){

img.style.opacity="1";

};

img.src="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);

};

});

let btn=document.querySelector(".generateBtn");

btn.disabled=true;

btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Generating...';

img.onload=function(){

img.style.opacity="1";
img.style.transform="scale(1)";
img.style.transition=".4s";

document.getElementById("logoText").innerHTML=name;

btn.disabled=false;

btn.innerHTML='<i class="fa-solid fa-wand-magic-sparkles"></i> Generate AI Logo';

};

img.style.transform="scale(.9)";

img.src="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)+"?width=1024&height=1024&nologo=true";

}

document.getElementById("aiLogo").style.transition=".4s";

</script>

</body>
</html>
